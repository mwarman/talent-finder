name: Teardown

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  teardown:
    name: Teardown

    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create infrastructure .env file
        working-directory: ./packages/infra
        run: |
          echo "${{ vars.CDK_ENV }}" > .env

      - name: Build
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          role-session-name: teardown-talent-finder-${{ github.run_id }}

      - name: Synthesize AWS CDK infrastructure
        run: npm run cdk:synth --workspace packages/infra

      - name: Teardown infrastructure
        run: npm run cdk:destroy --workspace packages/infra
