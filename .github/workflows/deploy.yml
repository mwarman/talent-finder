name: Deploy

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create infrastructure .env file
        working-directory: ./packages/infra
        run: |
          echo "CDK_APP_NAME=${{ vars.CDK_APP_NAME }}" >> .env
          echo "CDK_ENV_NAME=${{ vars.CDK_ENV_NAME }}" >> .env
          echo "CDK_ORGANIZATION_UNIT=${{ vars.CDK_ORGANIZATION_UNIT }}" >> .env
          echo "CDK_RESOURCE_OWNER=${{ vars.CDK_RESOURCE_OWNER }}" >> .env
          echo "CDK_LOG_LEVEL=${{ vars.CDK_LOG_LEVEL }}" >> .env
          echo "CDK_LOG_FORMAT=${{ vars.CDK_LOG_FORMAT }}" >> .env
          echo "CDK_LOG_ENABLED=${{ vars.CDK_LOG_ENABLED }}" >> .env
          echo "CDK_PINECONE_INDEX_HOST=${{ vars.CDK_PINECONE_INDEX_HOST }}" >> .env
          echo "CDK_PINECONE_API_KEY=${{ secrets.CDK_PINECONE_API_KEY }}" >> .env

      - name: Build
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          role-session-name: deploy-talent-finder-${{ github.run_id }}

      - name: Synthesize AWS CDK infrastructure
        run: npm run cdk:synth --workspace packages/infra

      - name: Deploy backend infrastructure
        run: npm run cdk:deploy --workspace packages/infra BackendStack

      - name: Retrieve API Gateway URL
        id: get-api-url
        run: |
          API_URL=$(aws cloudformation describe-stacks --stack-name ${{ vars.CDK_APP_NAME }}-backend-${{ vars.CDK_ENV_NAME }} --query "Stacks[0].Outputs[?OutputKey=='APIGatewayUrl'].OutputValue" --output text)
          echo "API_URL=$API_URL" >> $GITHUB_ENV

      - name: Create web .env file
        working-directory: ./packages/web
        run: |
          echo "VITE_API_BASE_URL=$API_URL" >> .env

      - name: Build web application
        run: npm run build --workspace packages/web

      - name: Deploy frontend infrastructure
        run: npm run cdk:deploy --workspace packages/infra FrontendStack

      - name: Clean up sensitive files
        if: always()
        run: |
          echo "🧹 Cleaning up sensitive files..."
          rm -f ./packages/infra/.env
          rm -rf ./packages/infra/cdk.out
          rm -f ./packages/web/.env
          echo "✅ Sensitive files cleaned up"
